<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaking Bad Online — Рынок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a08;
    --surface:  #111110;
    --card:     #161614;
    --border:   #2a2a26;
    --accent:   #c8f000;
    --accent2:  #00e8c8;
    --red:      #ff3030;
    --orange:   #ff8c00;
    --text:     #e8e8e0;
    --muted:    #666660;
    --font-display: 'Oswald', sans-serif;
    --font-mono:    'Share Tech Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(200,240,0,0.03) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0,232,200,0.03) 0%, transparent 50%);
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-decoration: none;
    text-transform: uppercase;
  }
  .logo span { color: var(--text); }
  nav { display: flex; gap: 2rem; }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  nav a:hover, nav a.active { color: var(--accent); }
  .user-info {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.8rem;
  }
  .cash-badge {
    background: rgba(200,240,0,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 4px 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  #loginBtn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 8px 16px;
    font-family: var(--font-display);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #loginBtn:hover { opacity: 0.85; }

  /* LAYOUT */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .tab {
    padding: 12px 24px;
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .tab:hover:not(.active) { color: var(--text); }

  /* PAGE SECTIONS */
  .page { display: none; }
  .page.active { display: block; }

  /* MARKET */
  .market-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .section-title {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,240,0,0.05);
  }
  .btn-primary {
    padding: 8px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger {
    background: var(--red);
    color: #fff;
  }

  /* LISTINGS GRID */
  .listings-grid {
    display: grid;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }
  .listing-card {
    background: var(--card);
    padding: 1rem 1.5rem;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr auto;
    align-items: center;
    gap: 1rem;
    transition: background 0.15s;
  }
  .listing-card:hover { background: var(--surface); }
  .listing-item-type {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .item-emoji { font-size: 1.5rem; }
  .item-name {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .item-quality {
    font-size: 0.75rem;
    color: var(--accent2);
    font-family: var(--font-mono);
  }
  .item-seller {
    font-size: 0.8rem;
    color: var(--muted);
  }
  .item-seller span {
    color: var(--text);
    font-weight: 600;
  }
  .item-amount {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    text-align: right;
  }
  .item-price {
    text-align: right;
  }
  .price-total {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    font-family: var(--font-display);
  }
  .price-per {
    font-size: 0.7rem;
    color: var(--muted);
  }
  .rank-badge {
    font-size: 0.65rem;
    padding: 2px 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .rank-legend { border-color: var(--accent); color: var(--accent); }
  .rank-baron   { border-color: var(--orange); color: var(--orange); }
  .rank-cook    { border-color: var(--accent2); color: var(--accent2); }

  /* TABLE HEADER */
  .table-header {
    background: var(--surface);
    padding: 0.6rem 1.5rem;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr auto;
    gap: 1rem;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  /* SELL MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    width: 480px;
    max-width: 95vw;
    padding: 2rem;
  }
  .modal-title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 1.5rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }
  .form-select, .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-select:focus, .form-input:focus {
    border-color: var(--accent);
  }
  .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
  .btn-secondary {
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }

  /* LEADERBOARD */
  .leaderboard-sort {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .lb-table {
    width: 100%;
    border-collapse: collapse;
    border: 1px solid var(--border);
  }
  .lb-table th {
    background: var(--surface);
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .lb-table td {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid rgba(42,42,38,0.5);
    font-size: 0.9rem;
  }
  .lb-table tr:hover td { background: var(--surface); }
  .pos-1 { color: var(--accent); font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; }
  .pos-2 { color: #c0c0c0; }
  .pos-3 { color: #cd7f32; }
  .nickname-cell {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .cash-cell { color: var(--accent); font-weight: 700; }

  /* FORUM */
  .forum-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 1.5rem;
  }
  .forum-categories {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .cat-item {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .cat-item:hover, .cat-item.active {
    border-color: var(--accent);
    background: rgba(200,240,0,0.05);
  }
  .cat-icon { font-size: 1.2rem; }
  .cat-name {
    font-family: var(--font-display);
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .topics-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); }
  .topic-item {
    background: var(--card);
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: background 0.15s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: center;
  }
  .topic-item:hover { background: var(--surface); }
  .topic-title {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  .topic-meta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .topic-stats { text-align: right; font-size: 0.75rem; color: var(--muted); }
  .pinned-badge {
    font-size: 0.65rem;
    background: rgba(200,240,0,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 1px 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2rem;
  }
  .stat-card {
    background: var(--card);
    padding: 1.25rem 1.5rem;
    text-align: center;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }
  .loading::after {
    content: '';
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-left: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* TOAST */
  .toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 12px 20px;
    font-size: 0.85rem;
    max-width: 320px;
    animation: slideIn 0.3s ease;
  }
  .toast.error { border-left-color: var(--red); }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
    background: var(--card);
    border: 1px solid var(--border);
  }
  .empty-icon { font-size: 3rem; display: block; margin-bottom: 1rem; opacity: 0.5; }

  @media (max-width: 768px) {
    .listing-card, .table-header { grid-template-columns: 1fr 1fr auto; }
    .listing-card > *:nth-child(3), .listing-card > *:nth-child(4) { display: none; }
    .table-header > *:nth-child(3), .table-header > *:nth-child(4) { display: none; }
    .forum-layout { grid-template-columns: 1fr; }
    .stats-bar { grid-template-columns: 1fr 1fr; }
    nav { display: none; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#"><span>BB</span>Online</a>
  <nav>
    <a href="#" class="active" onclick="showTab('market')">💊 Рынок</a>
    <a href="#" onclick="showTab('forum')">💬 Форум</a>
    <a href="#" onclick="showTab('leaderboard')">🏆 Топ</a>
  </nav>
  <div class="user-info" id="userInfo">
    <button id="loginBtn" onclick="loginWithTelegram()">Войти через Telegram</button>
  </div>
</header>

<main>
  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-value" id="statPlayers">—</div>
      <div class="stat-label">Игроков онлайн</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statListings">—</div>
      <div class="stat-label">Активных лотов</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTopCash">—</div>
      <div class="stat-label">Рекорд капитала</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statTopPlayer">—</div>
      <div class="stat-label">Легенда сервера</div>
    </div>
  </div>

  <!-- MARKET -->
  <div class="page active" id="page-market">
    <div class="market-header">
      <div class="section-title">💊 Рынок</div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" onclick="filterMarket(null, this)">Всё</button>
        <button class="filter-btn" onclick="filterMarket('product', this)">Продукт</button>
        <button class="filter-btn" onclick="filterMarket('methylamine', this)">Метиламин</button>
        <button class="filter-btn" onclick="filterMarket('phosphorus', this)">Фосфор</button>
        <button class="filter-btn" onclick="filterMarket('acid', this)">Кислота</button>
        <button class="filter-btn" onclick="filterMarket('packaging', this)">Упаковка</button>
      </div>
      <button class="btn-primary" onclick="openSellModal()" id="sellBtn" style="display:none">+ Продать</button>
    </div>

    <div class="table-header">
      <div>Товар</div>
      <div style="text-align:right">Кол-во</div>
      <div style="text-align:right">Продавец</div>
      <div style="text-align:right">Качество</div>
      <div style="text-align:right">Цена</div>
      <div></div>
    </div>
    <div class="listings-grid" id="listingsGrid">
      <div class="loading">Загрузка рынка</div>
    </div>
  </div>

  <!-- FORUM -->
  <div class="page" id="page-forum">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <div class="section-title">💬 Форум</div>
      <button class="btn-primary" onclick="openNewTopicModal()" id="newTopicBtn" style="display:none">+ Создать тему</button>
    </div>
    <div class="forum-layout">
      <div class="forum-categories" id="forumCategories">
        <div class="loading">...</div>
      </div>
      <div>
        <div class="topics-list" id="topicsList">
          <div class="empty-state">
            <span class="empty-icon">💬</span>
            Выберите категорию
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="page" id="page-leaderboard">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
      <div class="section-title">🏆 Топ игроков</div>
      <div class="leaderboard-sort">
        <button class="filter-btn active" onclick="loadLeaderboard('cash', this)">💰 Деньги</button>
        <button class="filter-btn" onclick="loadLeaderboard('level', this)">⬆️ Уровень</button>
        <button class="filter-btn" onclick="loadLeaderboard('reputation', this)">⭐ Репутация</button>
      </div>
    </div>
    <table class="lb-table" id="lbTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Игрок</th>
          <th>Ранг</th>
          <th>Уровень</th>
          <th>Баланс</th>
          <th>Репутация</th>
        </tr>
      </thead>
      <tbody id="lbBody">
        <tr><td colspan="6"><div class="loading">Загрузка</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- SELL MODAL -->
<div class="modal-overlay" id="sellModal">
  <div class="modal">
    <div class="modal-title">📦 Выставить на продажу</div>
    <div class="form-group">
      <label class="form-label">Тип товара</label>
      <select class="form-select" id="sellItemType">
        <option value="product">💊 Продукт</option>
        <option value="methylamine">🧪 Метиламин</option>
        <option value="phosphorus">🔴 Фосфор</option>
        <option value="acid">⚗️ Кислота</option>
        <option value="packaging">📦 Упаковка</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Количество</label>
      <input class="form-input" id="sellAmount" type="number" min="0.1" step="0.1" placeholder="10">
    </div>
    <div class="form-group">
      <label class="form-label">Цена за единицу ($)</label>
      <input class="form-input" id="sellPrice" type="number" min="1" placeholder="500">
    </div>
    <div id="sellTotal" style="color:var(--accent);font-family:var(--font-display);font-size:1.1rem;margin-top:0.5rem;min-height:1.5rem"></div>
    <div class="form-actions">
      <button class="btn-primary" onclick="submitListing()">Выставить</button>
      <button class="btn-secondary" onclick="closeSellModal()">Отмена</button>
    </div>
  </div>
</div>

<!-- NEW TOPIC MODAL -->
<div class="modal-overlay" id="topicModal">
  <div class="modal">
    <div class="modal-title">📝 Новая тема</div>
    <div class="form-group">
      <label class="form-label">Категория</label>
      <select class="form-select" id="topicCategory"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Заголовок</label>
      <input class="form-input" id="topicTitle" type="text" placeholder="Продаю крупную партию...">
    </div>
    <div class="form-group">
      <label class="form-label">Сообщение</label>
      <textarea class="form-input" id="topicContent" rows="5" placeholder="Текст темы..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="submitTopic()">Создать</button>
      <button class="btn-secondary" onclick="closeTopicModal()">Отмена</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toasts"></div>

<script>
const API = 'https://brknbad.github.io/brknbad/';
let currentUser = null;
let currentFilter = null;
let currentCategorySlug = null;
let categories = [];

// ── ITEM CONFIG ────────────────────────────────────────────────────────────
const ITEMS = {
  product:      { name: 'Продукт',    emoji: '💊' },
  methylamine:  { name: 'Метиламин',  emoji: '🧪' },
  phosphorus:   { name: 'Фосфор',     emoji: '🔴' },
  acid:         { name: 'Кислота',    emoji: '⚗️' },
  packaging:    { name: 'Упаковка',   emoji: '📦' },
};

const RANK_CLASS = {
  'легенда': 'rank-legend',
  'барон': 'rank-baron',
  'варщик': 'rank-cook',
};

// ── AUTH ───────────────────────────────────────────────────────────────────
function loginWithTelegram() {
  // В реальном проекте используется Telegram Login Widget
  // Для демо — показываем инструкцию
  toast('Откройте brcknbad_bot в Telegram и нажмите /start', false);
}

function setUser(userData) {
  currentUser = userData;
  document.getElementById('userInfo').innerHTML = `
    <span style="color:var(--muted);font-size:0.8rem">${userData.rank} · ${userData.nickname}</span>
    <span class="cash-badge">$${Math.floor(userData.cash).toLocaleString()}</span>
  `;
  document.getElementById('sellBtn').style.display = 'block';
  document.getElementById('newTopicBtn').style.display = 'block';
}

// ── TABS ───────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  
  if (name === 'market') loadMarket();
  if (name === 'forum') loadForumCategories();
  if (name === 'leaderboard') loadLeaderboard('cash');
}

// ── MARKET ────────────────────────────────────────────────────────────────
async function loadMarket(filter) {
  const grid = document.getElementById('listingsGrid');
  grid.innerHTML = '<div class="loading">Загрузка рынка</div>';

  try {
    const params = new URLSearchParams({ limit: 30 });
    if (filter) params.append('item_type', filter);
    const res = await fetch(`${API}/api/market?${params}`);
    const data = await res.json();
    renderListings(data.listings);
    updateStats(data.listings);
  } catch (e) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span>Ошибка загрузки. Проверьте подключение к серверу.</div>';
  }
}

function renderListings(listings) {
  const grid = document.getElementById('listingsGrid');
  if (!listings.length) {
    grid.innerHTML = '<div class="empty-state"><span class="empty-icon">💊</span>На рынке пусто. Будьте первым!</div>';
    return;
  }
  grid.innerHTML = listings.map(l => {
    const item = ITEMS[l.item_type] || { name: l.item_type, emoji: '📦' };
    const rankClass = RANK_CLASS[l.seller_rank] || '';
    const quality = l.quality ? `<div class="item-quality">Качество: ${l.quality.toFixed(1)}%</div>` : '';
    return `
    <div class="listing-card">
      <div class="listing-item-type">
        <div class="item-emoji">${item.emoji}</div>
        <div>
          <div class="item-name">${item.name}</div>
          ${quality}
        </div>
      </div>
      <div class="item-amount" style="text-align:right">${l.amount.toFixed(1)}</div>
      <div class="item-seller" style="text-align:right">
        <span>${l.seller}</span><br>
        <span class="rank-badge ${rankClass}">${l.seller_rank}</span>
      </div>
      <div style="text-align:right;color:var(--muted);font-size:0.85rem">${formatDate(l.created_at)}</div>
      <div class="item-price">
        <div class="price-total">$${Math.floor(l.total_price).toLocaleString()}</div>
        <div class="price-per">$${l.price_per_unit.toFixed(0)}/ед</div>
      </div>
      <button class="btn-primary" style="font-size:0.75rem;padding:6px 14px" onclick="buyListing(${l.id})">Купить</button>
    </div>`;
  }).join('');
}

function filterMarket(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadMarket(type);
}

async function buyListing(id) {
  if (!currentUser) { toast('Войдите через Telegram для покупки', true); return; }
  try {
    const res = await fetch(`${API}/api/market/buy`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: currentUser.telegram_id, listing_id: id })
    });
    const data = await res.json();
    toast(data.message, !data.ok);
    if (data.ok) { loadMarket(currentFilter); }
  } catch (e) { toast('Ошибка сервера', true); }
}

// ── SELL MODAL ─────────────────────────────────────────────────────────────
function openSellModal() {
  if (!currentUser) { toast('Войдите через Telegram', true); return; }
  document.getElementById('sellModal').classList.add('open');
}
function closeSellModal() { document.getElementById('sellModal').classList.remove('open'); }

document.addEventListener('DOMContentLoaded', () => {
  ['sellAmount', 'sellPrice'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateTotal);
  });
});

function updateTotal() {
  const a = parseFloat(document.getElementById('sellAmount').value) || 0;
  const p = parseFloat(document.getElementById('sellPrice').value) || 0;
  const total = a * p;
  document.getElementById('sellTotal').textContent = total > 0 ? `Итого: $${total.toLocaleString()}` : '';
}

async function submitListing() {
  if (!currentUser) return;
  const itemType = document.getElementById('sellItemType').value;
  const amount = parseFloat(document.getElementById('sellAmount').value);
  const price = parseFloat(document.getElementById('sellPrice').value);
  if (!amount || !price) { toast('Заполните все поля', true); return; }

  try {
    const res = await fetch(`${API}/api/market/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: currentUser.telegram_id, item_type: itemType, amount, price_per_unit: price })
    });
    const data = await res.json();
    toast(data.message, !data.ok);
    if (data.ok) { closeSellModal(); loadMarket(currentFilter); }
  } catch (e) { toast('Ошибка сервера', true); }
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────
async function loadLeaderboard(sortBy, btn) {
  if (btn) {
    document.querySelectorAll('.leaderboard-sort .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const tbody = document.getElementById('lbBody');
  tbody.innerHTML = '<tr><td colspan="6"><div class="loading">Загрузка</div></td></tr>';

  try {
    const res = await fetch(`${API}/api/leaderboard?sort_by=${sortBy}&limit=50`);
    const data = await res.json();
    
    tbody.innerHTML = data.map(p => {
      const posClass = p.position <= 3 ? `pos-${p.position}` : '';
      const rankClass = RANK_CLASS[p.rank] || '';
      const medals = ['🥇','🥈','🥉'];
      const posDisplay = p.position <= 3 ? medals[p.position-1] : p.position;
      return `
      <tr>
        <td class="${posClass}">${posDisplay}</td>
        <td class="nickname-cell">${p.nickname}</td>
        <td><span class="rank-badge ${rankClass}">${p.rank}</span></td>
        <td style="color:var(--text)">${p.level}</td>
        <td class="cash-cell">$${Math.floor(p.cash).toLocaleString()}</td>
        <td style="color:var(--accent2)">${Math.floor(p.reputation)}</td>
      </tr>`;
    }).join('');
    updateStatsFromLeaderboard(data);
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Ошибка загрузки</td></tr>';
  }
}

// ── FORUM ─────────────────────────────────────────────────────────────────
async function loadForumCategories() {
  const container = document.getElementById('forumCategories');
  try {
    const res = await fetch(`${API}/api/forum/categories`);
    categories = await res.json();
    container.innerHTML = categories.map(c => `
      <div class="cat-item" onclick="loadTopics('${c.slug}', this)">
        <span class="cat-icon">${c.icon}</span>
        <span class="cat-name">${c.name}</span>
      </div>
    `).join('');

    // Fill topic modal select
    const sel = document.getElementById('topicCategory');
    sel.innerHTML = categories.map(c => `<option value="${c.slug}">${c.icon} ${c.name}</option>`).join('');
    
    if (categories.length) loadTopics(categories[0].slug, container.children[0]);
  } catch (e) {
    container.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;padding:1rem">Ошибка загрузки</div>';
  }
}

async function loadTopics(slug, el) {
  currentCategorySlug = slug;
  document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  
  const list = document.getElementById('topicsList');
  list.innerHTML = '<div class="loading">Загрузка</div>';

  try {
    const res = await fetch(`${API}/api/forum/topics?category_slug=${slug}&limit=30`);
    const topics = await res.json();
    
    if (!topics.length) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">📝</span>Тем нет. Создайте первую!</div>';
      return;
    }
    list.innerHTML = topics.map(t => `
      <div class="topic-item">
        <div>
          <div class="topic-title">
            ${t.is_pinned ? '<span class="pinned-badge">PIN</span>' : ''}
            ${t.title}
          </div>
          <div class="topic-meta">${t.author} · ${t.author_rank} · ${formatDate(t.updated_at)}</div>
        </div>
        <div class="topic-stats">
          👁 ${t.views}<br>💬 ${t.post_count}
        </div>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty-state">Ошибка загрузки</div>';
  }
}

function openNewTopicModal() {
  if (!currentUser) { toast('Войдите через Telegram', true); return; }
  document.getElementById('topicModal').classList.add('open');
}
function closeTopicModal() { document.getElementById('topicModal').classList.remove('open'); }

async function submitTopic() {
  if (!currentUser) return;
  const category_slug = document.getElementById('topicCategory').value;
  const title = document.getElementById('topicTitle').value.trim();
  const content = document.getElementById('topicContent').value.trim();
  if (!title || !content) { toast('Заполните заголовок и текст', true); return; }

  try {
    const res = await fetch(`${API}/api/forum/topic/create`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ telegram_id: currentUser.telegram_id, category_slug, title, content })
    });
    const data = await res.json();
    toast(data.ok ? '✅ Тема создана!' : data.message, !data.ok);
    if (data.ok) { closeTopicModal(); loadTopics(category_slug); }
  } catch (e) { toast('Ошибка сервера', true); }
}

// ── STATS ─────────────────────────────────────────────────────────────────
function updateStats(listings) {
  document.getElementById('statListings').textContent = listings.length;
}
function updateStatsFromLeaderboard(data) {
  document.getElementById('statPlayers').textContent = data.length;
  if (data[0]) {
    document.getElementById('statTopCash').textContent = '$' + Math.floor(data[0].cash / 1000) + 'K';
    document.getElementById('statTopPlayer').textContent = data[0].nickname;
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg, isError = false) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'только что';
  if (diff < 3600) return Math.floor(diff/60) + 'м назад';
  if (diff < 86400) return Math.floor(diff/3600) + 'ч назад';
  return d.toLocaleDateString('ru-RU');
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadMarket();
  loadLeaderboard('cash');
  
  // Check URL for Telegram auth params
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('tg_id')) {
    fetch(`${API}/api/user/${urlParams.get('tg_id')}`)
      .then(r => r.json())
      .then(data => { if (data.telegram_id) setUser(data); })
      .catch(() => {});
  }

  // Close modals on overlay click
  document.getElementById('sellModal').addEventListener('click', function(e) {
    if (e.target === this) closeSellModal();
  });
  document.getElementById('topicModal').addEventListener('click', function(e) {
    if (e.target === this) closeTopicModal();
  });
});
</script>
